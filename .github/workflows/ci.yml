name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: phpcs
        run: composer phpcs

      - name: phpstan
        run: composer phpstan

      - name: psalm
        run: composer psalm

      # Unit tests live here but require the Magento Docker container to run
      # end-to-end — they are not gated in CI yet. Run with: composer test

